name: Test

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test and Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Validate docker-compose syntax
        run: |
          cd infra
          docker compose -f docker-compose.dev.yml config -q
          echo "docker-compose.dev.yml syntax is valid"

      - name: Check environment variables template
        run: |
          if [ ! -f infra/.env.example ]; then
            echo "Error: .env.example file is missing"
            exit 1
          fi

      - name: Check required files exist
        run: |
          required_files=(
            "infra/docker-compose.dev.yml"
            "infra/nginx/nginx.dev.conf"
            "infra/postgres/init.sql"
            "backend/Eltorto/Eltorto.API/Dockerfile"
            "frontend/Dockerfile"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Error: $file not found"
              exit 1
            fi
          done
            
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('tests/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Run Python integration tests
        run: |
          cd infra
          cp nginx/nginx.dev.conf nginx/nginx.conf
          echo "DB_PASSWORD=test" > .env.test

          docker compose -f docker-compose.dev.yml build
          DB_PASSWORD=test docker compose -f docker-compose.dev.yml up -d

          echo "Waiting for containers to be ready (25 seconds)..."
          sleep 25
    
          echo "Container status after wait:"
          docker compose -f docker-compose.dev.yml ps 

          echo "API logs:"
          docker compose -f docker-compose.dev.yml logs api || true

          if ! docker compose -f docker-compose.dev.yml ps | grep -q "Up"; then
            echo "ERROR: Containers are not running!"
            docker compose -f docker-compose.dev.yml logs
            exit 1
          fi
    
          cd ..
          pip install --cache-dir ~/.cache/pip -r tests/requirements.txt
          pytest tests/ -v --tb=short
          cd infra
          docker compose -f docker-compose.dev.yml down
          rm -f .env.test