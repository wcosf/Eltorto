name: Production Deployment

on:
  push:
    branches:
      - main                   
  pull_request:
    branches:
      - main                  
    types:
      - closed           

env:
  PROJECT_PATH: /root/eltorto.ru   

jobs:

  test:
    name: Test and Validate
    runs-on: ubuntu-latest              
    if: github.event_name == 'pull_request' 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: |
          cd infra
          docker compose config -q
          echo "docker-compose.yml syntax is valid"

      - name: Check environment variables template
        run: |
          if [ ! -f infra/.env.example ]; then
            echo "Error: .env.example file is missing"
            exit 1
          fi

      - name: Check required files exist
        run: |
          required_files=(
            "infra/docker-compose.yml"
            "infra/nginx/nginx.conf"
            "infra/postgres/init.sql"
            "backend/Eltorto/Eltorto.API/Dockerfile"
            "frontend/Dockerfile"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Error: $file not found"
              exit 1
            fi
          done
      
      - name: Test nginx configuration syntax
        run: |
          docker run --rm \
            -v $(pwd)/infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:alpine nginx -t

      - name: Run Python integration tests
        run: |
          cd infra
          echo "DB_PASSWORD=test" > .env.test
          docker compose --env-file .env.test up -d
          cd ..
          pip install -r tests/requirements.txt
          pytest tests/ -v --tb=short
          cd infra
          docker compose down
          rm .env.test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test                          
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'  # Только push в main
    environment:
      name: production
      url: https://eltorto.ru

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files with rsync
        run: |
          rsync -avz --delete \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='infra/nginx/logs/' \
            --exclude='infra/ssl/' \
            --exclude='temp.txt' \
            --exclude='tests/' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.PROJECT_PATH }}

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo " Starting deployment at $(date) "
            
            cd ${{ env.PROJECT_PATH }}
            
            cd infra
            
            echo "Creating .env file if not exists..."
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "WARNING: .env created from example. Please update passwords manually!"
            fi
            
            echo "Stopping old containers..."
            docker compose down --remove-orphans || true
            
            echo "Building and starting new containers..."
            docker compose up -d --build
            
            echo "Cleaning up old images..."
            docker image prune -f
            
            echo "Container status:"
            docker compose ps

      - name: Health check
        run: |
          sleep 10
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SSH_HOST }})
          if [ $STATUS_CODE -eq 200 ] || [ $STATUS_CODE -eq 301 ]; then
            echo "Health check passed. Status code: $STATUS_CODE"
          else
            echo "Health check failed. Status code: $STATUS_CODE"
            exit 1
          fi

  # откат 
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment:
      name: production

    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.PROJECT_PATH }}/infra
            echo " Rolling back to previous version "
            git reset --hard HEAD~1
            docker compose down
            docker compose up -d
            echo " Rollback completed "