<div class="reviews-page py-5">
  <div class="container">
    <h1 class="text-center mb-4" style="color: #8B6B4D;">Отзывы наших клиентов</h1>
    <p class="text-center mb-5" style="color: #7F6B58;">
      Мы ценим мнение каждого клиента и благодарны за ваши отзывы
    </p>

    <!-- Форма добавления отзыва -->
    <div class="review-form mb-5 p-4 rounded" style="background-color: #FFF5EB;">
      <h3 class="mb-4" style="color: #8B6B4D;">Оставить отзыв</h3>

      <div *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </div>

      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <form (ngSubmit)="onSubmitReview()">
        <div class="mb-3">
          <label for="author" class="form-label" style="color: #4A3B2C;">Ваше имя *</label>
          <input
            type="text"
            class="form-control"
            id="author"
            [(ngModel)]="newReview.author"
            name="author"
            required
            style="border-color: #D9C5B0;">
        </div>

        <div class="mb-3">
          <label for="email" class="form-label" style="color: #4A3B2C;">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            [(ngModel)]="newReview.email"
            name="email"
            style="border-color: #D9C5B0;">
        </div>

        <div class="mb-3">
          <label for="text" class="form-label" style="color: #4A3B2C;">Ваш отзыв *</label>
          <textarea
            class="form-control"
            id="text"
            rows="4"
            [(ngModel)]="newReview.text"
            name="text"
            required
            style="border-color: #D9C5B0;"></textarea>
        </div>

        <button
          type="submit"
          class="btn px-4"
          [disabled]="isSubmitting"
          style="background-color: #B89A7A; color: white;">
          {{ isSubmitting ? 'Отправка...' : 'Отправить отзыв' }}
        </button>
      </form>
    </div>

    <!-- Список отзывов -->
    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border" style="color: #B89A7A;" role="status">
        <span class="visually-hidden">Загрузка...</span>
      </div>
    </div>

    <div *ngIf="!isLoading && testimonials.length === 0" class="text-center py-5">
      <p style="color: #7F6B58;">Пока нет отзывов. Будьте первым!</p>
    </div>

    <div class="row">
      <div class="col-md-6 mb-4" *ngFor="let review of testimonials">
        <div class="review-card p-4 rounded shadow-sm" style="background-color: #FFF5EB;">
          <div class="mb-3">
            <i class="quote-icon" style="font-size: 2rem; color: #F9C6C9;">"</i>
          </div>
          <p class="mb-3" style="color: #4A3B2C; font-style: italic;">{{ review.text }}</p>
          <div class="mt-3">
            <strong style="color: #8B6B4D;">{{ review.author }}</strong>
            <p class="small mb-0" style="color: #B89A7A;">{{ review.date | date:'dd.MM.yyyy' }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
