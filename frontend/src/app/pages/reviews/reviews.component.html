<div class="reviews-page">
  <section class="reviews-hero">
    <div class="reviews-hero-bg"></div>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 text-center animate-on-scroll">
          <h1>Отзывы наших клиентов</h1>
          <p>
            Ваши слова — наша главная награда. Спасибо, что доверяете нам самые важные моменты!<br>
          </p>
        </div>
      </div>
    </div>

    <div class="reviews-wave">
      <svg viewBox="0 0 1440 320">
        <path d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,181.3C672,181,768,203,864,208C960,213,1056,203,1152,186.7C1248,171,1344,149,1392,138.7L1440,128L1440,320L0,320Z"></path>
      </svg>
    </div>
  </section>

  <div class="reviews-content">
    <div class="container py-5">

      <div *ngIf="isLoading" class="text-center py-5">
        <div class="spinner-border"></div>
      </div>

      <div class="reviews-grid">
        <div class="animate-on-scroll"
            *ngFor="let review of testimonials; let i = index"
            [style.animation-delay]="i * 0.05 + 's'">
          <div class="review-card p-4 rounded shadow-sm">
            <i class="quote-icon">"</i>
            <div class="review-text" [innerHTML]="review.text | sanitizeHtml"></div>
            <div class="mt-3">
              <strong>{{ review.author }}</strong>
              <p class="small mb-0">{{ review.date | date:'dd.MM.yyyy' }}</p>
            </div>
            <div *ngIf="review.response" class="review-response mt-3">
              <strong>Ответ кондитера:</strong>
              <div class="response-text mt-2" [innerHTML]="review.response | sanitizeHtml"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
