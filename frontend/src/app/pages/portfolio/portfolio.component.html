<div class="portfolio-page">
  <!-- Hero секция -->
  <section class="portfolio-hero">
    <div class="portfolio-hero-bg"></div>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 text-center portfolio-hero-content animate-on-scroll">
          <h1 class="portfolio-hero-title">
            Наше портфолио
          </h1>
          <p class="portfolio-hero-description">
            Вдохновляйтесь нашими работами! Каждый торт — это уникальное произведение искусства,
            созданное с любовью и вниманием к деталям.
          </p>
        </div>
      </div>
    </div>
    <div class="portfolio-wave">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
        <path fill="#FFF5EB" fill-opacity="1" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,181.3C672,181,768,203,864,208C960,213,1056,203,1152,186.7C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
      </svg>
    </div>
  </section>

  <!-- Фильтры по категориям -->
  <div class="filters-section">
    <div class="container">
      <div class="filters-wrapper">
        <div class="filters-scroll">
          <button
            class="filter-btn"
            [class.active]="selectedCategory === 'all'"
            (click)="resetFilter()">
            <i class="bi bi-grid-3x3-gap-fill me-1"></i>
            Все торты
          </button>
          <button
            *ngFor="let category of categories"
            class="filter-btn"
            [class.active]="selectedCategory === category.slug"
            (click)="filterByCategory(category.slug, category.name)">
            <i class="bi bi-tag-fill me-1"></i>
            {{ category.name }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Галерея -->
  <section class="portfolio-grid-section">
    <div class="container">
      <div *ngIf="isLoading" class="loading-container">
        <div class="cake-loader"></div>
      </div>

      <div *ngIf="error" class="alert alert-warning text-center">
        {{ error }}
      </div>

      <div class="row g-4" *ngIf="!isLoading && !error">
        <div class="col-md-6 col-lg-4" *ngFor="let cake of cakes; trackBy: trackById; let i = index">
          <div class="portfolio-card animate-on-scroll" [style.animation-delay]="i * 0.05 + 's'">
            <div class="portfolio-card-image">
              <img
                [src]="getThumbnailUrl(cake.imageUrl, cake.thumbnailUrl)"
                [alt]="cake.name"
                loading="lazy"
                (error)="handleImageError($event)">
            </div>
            <div class="portfolio-card-content">
              <h3 class="portfolio-card-title">{{ cake.name }}</h3>
            </div>
          </div>
        </div>
      </div>

      <!-- Пустое состояние -->
      <div *ngIf="!isLoading && !error && cakes.length === 0" class="text-center py-5">
        <i class="bi bi-emoji-frown" style="font-size: 3rem; color: #D9C5B0;"></i>
        <p class="mt-3" style="color: #7F6B58;">В этой категории пока нет тортов</p>
      </div>

      <!-- Пагинация -->
      <div *ngIf="!isLoading && totalPages > 1" class="pagination-wrapper text-center mt-5">
        <nav aria-label="Пагинация">
          <ul class="pagination justify-content-center">
            <li class="page-item" [class.disabled]="currentPage === 1">
              <button class="page-link" (click)="changePage(currentPage - 1)">
                <i class="bi bi-chevron-left"></i>
                Предыдущая
              </button>
            </li>
            <li class="page-item" *ngFor="let page of getPageNumbers()">
              <button
                class="page-link"
                [class.active]="currentPage === page"
                (click)="changePage(page)">
                {{ page }}
              </button>
            </li>
            <li class="page-item" [class.disabled]="currentPage === totalPages">
              <button class="page-link" (click)="changePage(currentPage + 1)">
                Следующая
                <i class="bi bi-chevron-right"></i>
              </button>
            </li>
          </ul>
        </nav>
        <p class="mt-2 small" style="color: #7F6B58;">
          Показано {{ cakes.length }} из {{ totalItems }} тортов
        </p>
      </div>
    </div>
  </section>
</div>
