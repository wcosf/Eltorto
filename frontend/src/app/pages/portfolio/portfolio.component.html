<div class="portfolio-page">
  <div class="container py-5">
    <h1 class="text-center mb-4" style="color: #8B6B4D;">Наше портфолио</h1>
    <p class="text-center mb-5" style="color: #7F6B58;">
      {{ totalItems > 0 ? 'Всего ' + totalItems + ' тортов' : 'Каждый торт - уникальное произведение искусства' }}
    </p>

    <!-- Фильтры -->
    <div class="filters text-center mb-5">
      <button
        class="btn me-2 mb-2"
        [class.active]="selectedCategory === 'all'"
        (click)="filterByCategory('all')">
        Все торты
      </button>
      <button
        *ngFor="let category of categories"
        class="btn me-2 mb-2"
        [class.active]="selectedCategory === category.slug"
        (click)="filterByCategory(category.slug)">
        {{ category.name }}
      </button>
    </div>

    <!-- Загрузка -->
    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border" style="color: #B89A7A;" role="status">
        <span class="visually-hidden">Загрузка...</span>
      </div>
      <p class="mt-3" style="color: #7F6B58;">Загрузка фотографий...</p>
    </div>

    <!-- Ошибка -->
    <div *ngIf="error" class="alert alert-warning text-center">
      {{ error }}
    </div>

    <!-- Галерея -->
    <div class="row" *ngIf="!isLoading && !error">
      <div class="col-md-4 col-sm-6 mb-4" *ngFor="let cake of cakes; trackBy: trackById">
        <div class="portfolio-card">
          <div class="card h-100 border-0 shadow-sm">
            <div class="image-wrapper">
              <img
                [src]="getThumbnailUrl(cake.imageUrl, cake.thumbnailUrl)"
                [alt]="cake.name"
                class="card-img-top"
                loading="lazy"
                (error)="handleImageError($event)">
              <div class="overlay">
                <button class="btn btn-light btn-sm" (click)="openModal(cake)">
                  Быстрый просмотр
                </button>
              </div>
            </div>
            <div class="card-body text-center">
              <h5 class="card-title" style="color: #8B6B4D;">{{ cake.name }}</h5>
              <p class="card-text small" style="color: #7F6B58;">{{ cake.description || 'Торт ручной работы' }}</p>
              <button class="btn btn-sm" style="background-color: #F9C6C9; color: #8B6B4D;" routerLink="/order">
                Заказать
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Пагинация -->
    <div *ngIf="!isLoading && totalPages > 1" class="pagination-wrapper text-center mt-5">
      <nav aria-label="Пагинация">
        <ul class="pagination justify-content-center">
          <li class="page-item" [class.disabled]="currentPage === 1">
            <button class="page-link" (click)="changePage(currentPage - 1)">Предыдущая</button>
          </li>
          <li class="page-item" *ngFor="let page of [].constructor(totalPages); let i = index">
            <button
              class="page-link"
              [class.active]="currentPage === i + 1"
              (click)="changePage(i + 1)">
              {{ i + 1 }}
            </button>
          </li>
          <li class="page-item" [class.disabled]="currentPage === totalPages">
            <button class="page-link" (click)="changePage(currentPage + 1)">Следующая</button>
          </li>
        </ul>
      </nav>
      <p class="mt-2 small" style="color: #7F6B58;">
        Показано {{ cakes.length }} из {{ totalItems }} тортов
      </p>
    </div>
  </div>
</div>
