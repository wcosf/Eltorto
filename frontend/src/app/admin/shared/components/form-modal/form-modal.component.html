<h2 mat-dialog-title>{{ config.title }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form-grid">
    <div *ngFor="let field of fields" class="form-field" [class.hidden]="field.hidden">
      <mat-form-field appearance="fill" *ngIf="field.type === 'text' || field.type === 'email' || field.type === 'number'">
        <mat-label>{{ field.label }}</mat-label>
        <input matInput [type]="field.type" [formControlName]="field.key"
               [placeholder]="field.placeholder || ''"
               [required]="isRequired(field)">
        <mat-error *ngIf="form.get(field.key)?.hasError('required')">
          {{ field.label }} обязательно
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" *ngIf="field.type === 'textarea'">
        <mat-label>{{ field.label }}</mat-label>
        <textarea matInput [formControlName]="field.key"
                  [rows]="field.rows || 4"
                  [placeholder]="field.placeholder || ''"
                  [required]="isRequired(field)"></textarea>
        <mat-error *ngIf="form.get(field.key)?.hasError('required')">
          {{ field.label }} обязательно
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="fill" *ngIf="field.type === 'select'">
        <mat-label>{{ field.label }}</mat-label>
        <mat-select [formControlName]="field.key" [required]="isRequired(field)">
          <mat-option *ngFor="let option of field.options" [value]="option.value">
            {{ option.label }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="form.get(field.key)?.hasError('required')">
          {{ field.label }} обязательно
        </mat-error>
      </mat-form-field>

      <div class="checkbox-wrapper" *ngIf="field.type === 'checkbox'">
        <mat-checkbox [formControlName]="field.key" [required]="isRequired(field)">
          {{ field.label }}
        </mat-checkbox>
      </div>

      <mat-form-field appearance="fill" *ngIf="field.type === 'date'">
        <mat-label>{{ field.label }}</mat-label>
        <input matInput [matDatepicker]="picker" [formControlName]="field.key">
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
        <mat-error *ngIf="form.get(field.key)?.hasError('required')">
          {{ field.label }} обязательно
        </mat-error>
      </mat-form-field>

      <div *ngIf="field.type === 'file'" class="file-upload-wrapper">
        <label>{{ field.label }}</label>
        <input type="file" [accept]="field.fileAccept" (change)="onFileSelected($event, field.key)">
      </div>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="loading">
    {{ config.cancelLabel || 'Отмена' }}
  </button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="form.invalid || loading">
    <mat-icon *ngIf="loading"><mat-spinner diameter="20"></mat-spinner></mat-icon>
    {{ config.submitLabel || 'Сохранить' }}
  </button>
</mat-dialog-actions>
