<div class="data-table-container">
  <div class="data-table-toolbar" *ngIf="config.enableSearch">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Поиск</mat-label>
      <input matInput [(ngModel)]="searchTerm" (input)="onSearch()" />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)" *ngIf="!loading">
      <ng-container *ngFor="let column of config.columns" [matColumnDef]="column.key">
        <th mat-header-cell *matHeaderCellDef mat-sort-header [disabled]="!column.sortable">
          {{ column.label }}
        </th>
        <td mat-cell *matCellDef="let row" [class]="column.cssClass">
          {{ getColumnValue(row, column) }}
        </td>
      </ng-container>

      <ng-container matColumnDef="actions" *ngIf="config.actions?.length">
        <th mat-header-cell *matHeaderCellDef>Действия</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button *ngFor="let action of config.actions"
                  [color]="action.color || 'primary'"
                  (click)="onAction(action, row)"
                  [disabled]="action.condition && !action.condition(row)"
                  matTooltip="{{ action.label }}">
            <mat-icon>{{ action.icon || 'more_vert' }}</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div class="loading-shade" *ngIf="loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div class="empty-state" *ngIf="!loading && dataSource.data.length === 0">
      <mat-icon>inbox</mat-icon>
      <p>Нет данных</p>
    </div>
  </div>

  <mat-paginator
    [length]="totalCount"
    [pageSize]="pageSize"
    [pageSizeOptions]="config.pageSizeOptions || [5, 10, 25, 50]"
    (page)="onPageChange($event)"
    showFirstLastButtons>
  </mat-paginator>
</div>
