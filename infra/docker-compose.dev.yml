version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eltorto_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: eltorto_pg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d eltorto_pg" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - eltorto_network
    restart: unless-stopped

  api:
    build:
      context: ../backend/Eltorto
      dockerfile: Eltorto.API/Dockerfile
    container_name: eltorto_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=eltorto_pg;Username=postgres;Password=${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eltorto_network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: eltorto_frontend
    depends_on:
      - api
    networks:
      - eltorto_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: eltorto_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
      - ./nginx/scripts:/scripts:ro
    depends_on:
      - api
      - frontend
    networks:
      - eltorto_network
    restart: unless-stopped

networks:
  eltorto_network:
    driver: bridge

volumes:
  pgdata:
